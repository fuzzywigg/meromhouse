name: Feature
description: New KPI, data source, or dashboard capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Dashboard-UI, GitHub-Stats-API, CF-Pages, Analytics, SEO, New-Data-Source]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Critical, High, Medium, Low]
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options: [XS, S, M, L, XL]
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options: [Backlog, Ready, "In Progress", Blocked]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What should this show or do?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
