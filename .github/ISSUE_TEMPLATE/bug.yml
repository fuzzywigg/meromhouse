name: Bug
description: Something isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Dashboard-UI, GitHub-Stats-API, CF-Pages, Analytics, SEO, Deploy]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Critical, High, Medium, Low]
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options: [XS, S, M, L, XL]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
