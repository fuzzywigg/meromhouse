name: Chore / Infra / Docs
description: Technical debt, infra work, or documentation
title: "[Chore]: "
labels: ["chore"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options: [Chore, Infra, Docs, Research]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Critical, High, Medium, Low]
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      options: [XS, S, M, L, XL]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What needs to be done?
    validations:
      required: true
